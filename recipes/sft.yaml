model_name_or_path: deepseek-ai/DeepSeek-Prover-V1.5-Base
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

dataset_mixer:
  zhouxingshi/Lean-workbook-proofs_processed: 1.0
dataset_splits:
- train
- test
preprocessing_num_workers: 16

load_in_4bit: true
use_peft: false
lora_r: 0

# SFT trainer config
num_train_epochs: 2
learning_rate: 2.e-5
bf16: true
do_train: true
do_eval: false
eval_strategy: epoch
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: true
log_level: info
logging_steps: 5
logging_strategy: steps
hub_model_id: prover
hub_private_repo: true
output_dir: ""
overwrite_output_dir: true
per_device_eval_batch_size: 4
per_device_train_batch_size: 4
push_to_hub: true
report_to:
- tensorboard
save_strategy: epoch
save_total_limit: 1
save_only_model: true
warmup_ratio: 0.1

# Additional config
batch_size: 32
max_length: 2048

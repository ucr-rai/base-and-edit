model_name_or_path: Qwen/Qwen3-8B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

model_init_kwargs:
  device_map: null
  dtype: bfloat16

dataset_mixer:
  data/base_and_edit/sft_fill_answer_v7: 1.0
dataset_splits:
- train
- test
preprocessing_num_workers: 8

load_in_4bit: false
use_peft: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj

num_train_epochs: 3
learning_rate: 1.e-4
bf16: true
do_train: true
do_eval: true
eval_strategy: epoch
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
ddp_find_unused_parameters: false
log_level: info
logging_steps: 5
logging_strategy: steps
hub_model_id: base_and_edit_fill_answer_qwen3_8b_b2strict_v7
hub_private_repo: true
output_dir: outputs/sft/fill_answer_qwen3_8b_b2strict_v7
overwrite_output_dir: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
push_to_hub: false
report_to:
- tensorboard
save_strategy: epoch
save_total_limit: 2
save_only_model: true
warmup_ratio: 0.1

batch_size: 4
max_length: 4096
